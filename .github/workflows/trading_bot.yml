name: ICT Trading Bot 24/7

on:
  schedule:
    - cron: '*/10 * * * *'   # secours toutes les 10 min si la chaine casse
  push:
    paths:
      - 'state/state.json'
  workflow_dispatch:
    inputs:
      chain:
        description: 'Chained run from previous instance'
        required: false
        default: 'no'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: trading-bot
      cancel-in-progress: false

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run ICT bot
        id: bot
        continue-on-error: true   # ne pas casser la chaine si erreur Python
        env:
          NTFY_TOPIC: nice-lens-ogc-emir
        run: python3 bot_cloud.py

      - name: Sauvegarder l'etat
        if: always()
        continue-on-error: true
        run: |
          git config user.name  "ICT Bot"
          git config user.email "bot@trading.local"
          git add state/state.json || true
          git diff --cached --quiet || git commit -m "bot: state update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      - name: Attendre 5 minutes
        if: always()
        run: sleep 290

      - name: Auto-trigger prochain run
        if: always()           # CLE : toujours relancer la chaine, meme apres erreur
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/trading_bot.yml/dispatches \
            -d '{"ref":"main","inputs":{"chain":"yes"}}'
          echo "Prochain run declenche"
