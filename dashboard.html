<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Trading Bot Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1419; color: #e6e9ec; margin: 0; padding: 20px;
  }
  h1 { font-size: 1.8em; margin: 0 0 6px; }
  .subtitle { color: #6b7785; font-size: 0.9em; margin-bottom: 20px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
  }
  .card {
    background: #1a2027; border-radius: 12px; padding: 20px;
    border: 1px solid #252d36;
  }
  .card h2 {
    margin: 0 0 12px; font-size: 1.2em;
    display: flex; align-items: center; gap: 8px;
  }
  .big {
    font-size: 2.4em; font-weight: 700; margin: 8px 0; letter-spacing: -1px;
  }
  .pos { color: #4ade80; }
  .neg { color: #f87171; }
  .neu { color: #94a3b8; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .label { color: #94a3b8; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
  th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #252d36; }
  th { color: #94a3b8; font-weight: 500; }
  .total {
    background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
    grid-column: 1 / -1;
  }
  .total .big { font-size: 3em; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.75em; font-weight: 600;
  }
  .badge-tp { background: #064e3b; color: #6ee7b7; }
  .badge-sl { background: #7f1d1d; color: #fca5a5; }
  .badge-be { background: #1e3a5f; color: #93c5fd; }
  .badge-trail { background: #422006; color: #fdba74; }
  .badge-shock { background: #581c87; color: #d8b4fe; }
  .footer { color: #6b7785; font-size: 0.8em; text-align: center; margin-top: 30px; }
  .refresh { color: #6b7785; cursor: pointer; }
  .open-pos { background: #2c3540; border-radius: 6px; padding: 10px; margin-top: 8px; font-size: 0.9em; }
</style>
</head>
<body>
<h1>📊 Trading Bot Dashboard</h1>
<div class="subtitle">
  Mis à jour : <span id="lastUpdate">…</span>
  <span class="refresh" onclick="loadAll()">🔄 Refresh</span>
</div>

<div class="grid" id="grid">
  <div class="card"><h2>Chargement…</h2></div>
</div>

<div class="footer">
  Données depuis github.com/emirsqalli23-cpu/trading-bot — auto-refresh toutes les 60s
</div>

<script>
const REPO = "emirsqalli23-cpu/trading-bot";
const MARKETS = [
  { key: "crypto", emoji: "🪙", label: "Crypto",  desc: "BTC/ETH/SOL" },
  { key: "gold",   emoji: "🥇", label: "Or",      desc: "XAU/USD" },
  { key: "forex",  emoji: "💱", label: "Forex",   desc: "EUR/USD, GBP/USD" },
];
const CAPITAL_START = 1000.0;

async function fetchState(market) {
  const url = `https://raw.githubusercontent.com/${REPO}/main/state/state_${market}.json?nocache=${Date.now()}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function fmt(n, sign=true) {
  const s = (n >= 0 && sign ? "+" : "") + n.toFixed(0);
  return s;
}

function badgeFor(type) {
  const map = {
    "TP": "badge-tp", "TP_PARTIAL": "badge-tp", "TP_EXTENDED": "badge-tp",
    "SL": "badge-sl", "BE": "badge-be", "TRAIL_EXIT": "badge-trail",
    "SHOCK_EXIT": "badge-shock"
  };
  return `<span class="badge ${map[type] || ''}">${type}</span>`;
}

function renderMarket(m, state) {
  const cap = state ? state.capital : CAPITAL_START;
  const trades = state ? (state.trades || []) : [];
  const pos = state ? (state.positions || {}) : {};
  const pnl = cap - CAPITAL_START;
  const wins = trades.filter(t => t.pnl > 0).length;
  const wr = trades.length ? Math.round(wins / trades.length * 100) : 0;
  const cls = pnl > 0 ? "pos" : pnl < 0 ? "neg" : "neu";

  let posHtml = "";
  for (const [sym, p] of Object.entries(pos)) {
    const flags = [];
    if (p.be_set)        flags.push("🛡️ BE");
    if (p.tp1_taken)     flags.push("💰 50% pris");
    if (p.trail_active)  flags.push("🎯 Trailing");
    posHtml += `<div class="open-pos">
      <b>${sym}</b> ${p.direction === "LONG" ? "📈 LONG" : "📉 SHORT"} —
      Entrée: ${p.entry.toFixed(4)} | SL: ${p.sl.toFixed(4)} | TP: ${p.tp1.toFixed(4)}
      ${flags.length ? "<br>" + flags.join(" • ") : ""}
    </div>`;
  }

  const recent = trades.slice(-5).reverse();
  const tradeRows = recent.map(t => `
    <tr>
      <td>${t.time.slice(5,16).replace("T"," ")}</td>
      <td>${t.symbol}</td>
      <td>${badgeFor(t.type)}</td>
      <td class="${t.pnl >= 0 ? 'pos' : 'neg'}">${fmt(t.pnl)}$</td>
    </tr>
  `).join("");

  return `<div class="card">
    <h2>${m.emoji} ${m.label} <span style="color:#6b7785;font-size:0.7em">${m.desc}</span></h2>
    <div class="big ${cls}">${cap.toFixed(0)}$</div>
    <div class="row"><span class="label">P&L total</span><span class="${cls}">${fmt(pnl)}$</span></div>
    <div class="row"><span class="label">Win rate</span><span>${wr}% (${wins}/${trades.length})</span></div>
    <div class="row"><span class="label">Positions ouvertes</span><span>${Object.keys(pos).length}</span></div>
    ${posHtml}
    ${trades.length ? `<table><thead><tr><th>Date</th><th>Crypto</th><th>Type</th><th>P&L</th></tr></thead><tbody>${tradeRows}</tbody></table>` : ''}
  </div>`;
}

async function loadAll() {
  const states = await Promise.all(MARKETS.map(m => fetchState(m.key)));
  let totalCap = 0;
  let totalPnl = 0;
  let totalTrades = 0;
  let totalWins = 0;
  states.forEach(s => {
    if (s) {
      totalCap += s.capital;
      totalPnl += s.capital - CAPITAL_START;
      const trades = s.trades || [];
      totalTrades += trades.length;
      totalWins += trades.filter(t => t.pnl > 0).length;
    } else {
      totalCap += CAPITAL_START;
    }
  });
  const totalWr = totalTrades ? Math.round(totalWins / totalTrades * 100) : 0;
  const totalCls = totalPnl > 0 ? "pos" : totalPnl < 0 ? "neg" : "neu";

  let html = `<div class="card total">
    <h2>💰 Total des 3 bots</h2>
    <div class="big ${totalCls}">${totalCap.toFixed(0)}$ <span style="font-size:0.4em;opacity:0.7">/ 3000$</span></div>
    <div class="row"><span>P&L global</span><span class="${totalCls}">${fmt(totalPnl)}$ (${(totalPnl/30).toFixed(1)}%)</span></div>
    <div class="row"><span>Trades cumulés</span><span>${totalTrades} (WR: ${totalWr}%)</span></div>
  </div>`;

  MARKETS.forEach((m, i) => { html += renderMarket(m, states[i]); });
  document.getElementById("grid").innerHTML = html;
  document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString("fr-FR");
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
