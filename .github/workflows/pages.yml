name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare site
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp comment_ca_marche.html _site/comment_ca_marche.html 2>/dev/null || true
          # Copie aussi tout autre HTML a la racine
          for f in *.html; do
            [ "$f" = "dashboard.html" ] && continue
            cp "$f" "_site/$f" 2>/dev/null || true
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
