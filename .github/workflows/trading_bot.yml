name: ICT Trading Bot 24/7

on:
  schedule:
    - cron: '*/15 * * * *'   # fallback cron (souvent throttle par GitHub)
  push:
    paths:
      - 'state/state.json'
  workflow_dispatch:           # peut etre declenche par lui-meme via PAT
    inputs:
      chain:
        description: 'Chained run from previous instance'
        required: false
        default: 'no'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: trading-bot
      cancel-in-progress: false

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run ICT bot
        env:
          NTFY_TOPIC: nice-lens-ogc-emir
        run: python3 bot_cloud.py

      - name: Sauvegarder l'etat
        run: |
          git config user.name  "ICT Bot"
          git config user.email "bot@trading.local"
          git add state/state.json
          git diff --cached --quiet || git commit -m "bot: state update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Attendre 5 minutes
        run: sleep 290

      - name: Auto-trigger prochain run
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/trading_bot.yml/dispatches \
            -d '{"ref":"main","inputs":{"chain":"yes"}}'
          echo "✅ Prochain run declenche"
